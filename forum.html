<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Forum | Meister Uni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950">

    <nav class="nav-glass h-20 flex items-center justify-between px-6 md:px-12">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-10 h-10 btn-primary flex items-center justify-center p-0">
                <i data-lucide="graduation-cap" class="text-white"></i>
            </div>
            <span class="text-xl font-black uppercase tracking-tighter">Meister <span class="text-indigo-600">Uni</span></span>
        </div>
        <div class="flex items-center gap-6">
            <button id="theme-toggle" class="p-2 rounded-xl hover:bg-gray-200 dark:hover:bg-slate-800 transition-all">
                <i data-lucide="moon" class="dark:hidden"></i>
                <i data-lucide="sun" class="hidden dark:block"></i>
            </button>
            <div id="nav-user"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <aside class="lg:col-span-3 space-y-6">
                <div class="bento-card">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Kategorien</h3>
                    <nav class="space-y-2">
                        <button onclick="filterForum('all')" class="w-full flex items-center gap-3 p-3 rounded-xl bg-indigo-500/10 text-indigo-600 font-bold text-sm">
                            <i data-lucide="layout-grid" size="18"></i> Alle Beiträge
                        </button>
                        <button onclick="filterForum('tips')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-sm font-medium">
                            <i data-lucide="lightbulb" size="18"></i> Prüfungstipps
                        </button>
                        <button onclick="filterForum('materials')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-sm font-medium">
                            <i data-lucide="file-text" size="18"></i> Lernmaterialien
                        </button>
                        <button onclick="filterForum('events')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-sm font-medium">
                            <i data-lucide="calendar" size="18"></i> Uni-Events
                        </button>
                    </nav>
                </div>

                <div class="p-6 card-gradient rounded-[2rem] text-white shadow-xl shadow-indigo-500/20">
                    <h4 class="font-bold mb-2">Deine Uni-Gruppe</h4>
                    <p class="text-xs opacity-80 mb-4">Du bist aktuell mit der <b>Uni Köln</b> verbunden.</p>
                    <button class="w-full py-2 bg-white/20 rounded-lg text-xs font-bold hover:bg-white/30 transition-all">Uni wechseln</button>
                </div>
            </aside>

            <div class="lg:col-span-6 space-y-6">
                <div class="bento-card p-4">
                    <div class="flex gap-4">
                        <div id="user-avatar-small"></div>
                        <button onclick="openModal()" class="flex-1 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl px-6 text-left text-slate-400 text-sm hover:border-indigo-500 transition-all">
                            Was beschäftigt dich gerade?
                        </button>
                    </div>
                </div>

                <div id="forum-feed" class="space-y-4">
                    </div>
            </div>

            <aside class="lg:col-span-3 space-y-6">
                <div class="bento-card">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Beliebte Themen</h3>
                    <div class="space-y-4">
                        <div class="flex items-start gap-3">
                            <span class="text-indigo-600 font-bold">#1</span>
                            <div>
                                <p class="text-sm font-bold">Mathe I Klausur 2024</p>
                                <p class="text-[10px] text-slate-400 uppercase">42 Beiträge heute</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3">
                            <span class="text-indigo-600 font-bold">#2</span>
                            <div>
                                <p class="text-sm font-bold">Besten Bib-Plätze</p>
                                <p class="text-[10px] text-slate-400 uppercase">18 Beiträge heute</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="postModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm">
        <div class="bento-card w-full max-w-lg bg-white dark:bg-slate-900 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Beitrag erstellen</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <textarea id="postContent" placeholder="Schreib etwas Hilfreiches..." class="w-full h-40 p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-indigo-500 mb-6 resize-none"></textarea>
            <button onclick="submitPost()" class="btn-primary w-full py-4">Veröffentlichen</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // FORUM LOGIK
        const Forum = {
            posts: JSON.parse(localStorage.getItem('mu_posts')) || [
                { id: 1, user: "Lukas", uni: "TUM", text: "Hat jemand die Zusammenfassung für Statistik 1?", likes: 12, category: "materials" },
                { id: 2, user: "Sarah", uni: "LMU", text: "Tipp: Die Bib ist ab 8 Uhr schon voll, kommt früher!", likes: 24, category: "tips" }
            ],

            init() {
                this.render();
                this.renderAvatar();
            },

            renderAvatar() {
                const user = JSON.parse(localStorage.getItem('mu_user'));
                if(user) {
                    document.getElementById('user-avatar-small').innerHTML = `<img src="${user.avatar}" class="w-10 h-10 rounded-full">`;
                }
            },

            render(filter = 'all') {
                const feed = document.getElementById('forum-feed');
                const filtered = filter === 'all' ? this.posts : this.posts.filter(p => p.category === filter);
                
                feed.innerHTML = filtered.map(p => `
                    <div class="bento-card group">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-600 font-bold text-xs">
                                    ${p.user[0]}
                                </div>
                                <div>
                                    <p class="text-sm font-bold">${p.user}</p>
                                    <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">${p.uni}</p>
                                </div>
                            </div>
                            <span class="text-[10px] font-bold px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded-md text-slate-500">${p.category}</span>
                        </div>
                        <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed mb-6">${p.text}</p>
                        <div class="flex items-center gap-4 border-t border-slate-100 dark:border-slate-800 pt-4">
                            <button class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-indigo-600 transition-all">
                                <i data-lucide="heart" size="14"></i> ${p.likes}
                            </button>
                            <button class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-indigo-600 transition-all">
                                <i data-lucide="message-square" size="14"></i> Antworten
                            </button>
                        </div>
                    </div>
                `).reverse().join('');
                lucide.createIcons();
            }
        };

        function openModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }
        
        function submitPost() {
            const text = document.getElementById('postContent').value;
            const user = JSON.parse(localStorage.getItem('mu_user')) || { name: "Anonym", uni: "Meister Uni" };
            if(!text) return;

            const newPost = {
                id: Date.now(),
                user: user.name,
                uni: user.uni || "Deine Uni",
                text: text,
                likes: 0,
                category: "general"
            };

            Forum.posts.push(newPost);
            localStorage.setItem('mu_posts', JSON.stringify(Forum.posts));
            document.getElementById('postContent').value = '';
            closeModal();
            Forum.render();
        }

        function filterForum(cat) {
            Forum.render(cat);
        }

        document.addEventListener('DOMContentLoaded', () => Forum.init());
    </script>
</body>
</html>
