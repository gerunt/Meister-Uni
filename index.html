<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meister Uni | Dein intelligenter Lernplaner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950">

    <nav class="nav-glass h-20 flex items-center justify-between px-6 md:px-12">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 btn-primary flex items-center justify-center p-0">
                <i data-lucide="graduation-cap" class="text-white"></i>
            </div>
            <span class="text-xl font-black uppercase tracking-tighter">Meister <span class="text-indigo-600">Uni</span></span>
        </div>
        <div class="flex items-center gap-6">
            <button id="theme-toggle" class="p-2 rounded-xl hover:bg-gray-200 dark:hover:bg-slate-800 transition-all">
                <i data-lucide="sun" class="hidden dark:block"></i>
                <i data-lucide="moon" class="block dark:hidden"></i>
            </button>
            <div id="nav-user">
                <a href="login.html" class="text-sm font-bold hover:text-indigo-600">Login</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-16">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">Dein Studium. <br><span class="text-indigo-600">Dein System.</span></h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg max-w-2xl mx-auto">Meister Uni berechnet basierend auf deiner Uni und deinem Vorwissen den perfekten Pfad zur Bestnote.</p>
        </div>

        <div class="bento-card max-w-3xl mx-auto p-8 md:p-12">
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3">
                <i data-lucide="sparkles" class="text-indigo-500"></i> Lernplan konfigurieren
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-black uppercase text-slate-400">Universität</label>
                    <input type="text" id="uni" placeholder="z.B. Uni Köln" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black uppercase text-slate-400">Studienfach</label>
                    <input type="text" id="subject" placeholder="z.B. BWL" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black uppercase text-slate-400">Art der Aufgabe</label>
                    <select id="type" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="exam">Klausur / Prüfung</option>
                        <option value="paper">Hausarbeit</option>
                        <option value="present">Referat / Präsentation</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black uppercase text-slate-400">Deadline</label>
                    <input type="date" id="deadline" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <button onclick="App.generatePlan()" class="btn-primary w-full mt-10 py-5 text-lg">Jetzt Master-Plan erstellen</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
