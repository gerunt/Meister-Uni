<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meister Uni | Dein Studium. Dein Plan.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-300 font-sans">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i data-lucide="book-open"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">Meister Uni</span>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors">
                    <i data-lucide="moon" id="moon-icon"></i>
                    <i data-lucide="sun" id="sun-icon" class="hidden"></i>
                </button>
                <a href="dashboard.html" class="text-sm font-medium hover:text-indigo-600">Dashboard</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-16 text-center">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-100 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-sm font-medium mb-8">
            <span class="h-2 w-2 rounded-full bg-indigo-600 animate-pulse"></span>
            KI-Lernplan Generator v1.0
        </div>
        
        <h1 class="text-4xl md:text-6xl font-extrabold mb-6 tracking-tight">
            Dein Studium. <br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-500">Dein perfekter Plan.</span>
        </h1>

        <div id="setup-form" class="mt-12 max-w-md mx-auto bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl border border-gray-100 dark:border-slate-700 text-left">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="sparkles" class="text-indigo-500"></i> Plan konfigurieren
            </h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Studienfach</label>
                    <input type="text" id="subject" placeholder="z.B. BWL oder Informatik" class="w-full p-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Prüfungsdatum</label>
                    <input type="date" id="exam-date" class="w-full p-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Lernzeit (Std. pro Woche)</label>
                    <input type="number" id="hours" value="10" class="w-full p-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <button onclick="generateMeisterPlan()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                    Jetzt Plan erstellen <i data-lucide="arrow-right" size="18"></i>
                </button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
