<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meister Uni | Startseite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 transition-colors">
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="bg-indigo-600 p-2 rounded-lg text-white"><i data-lucide="book-open"></i></div>
                <span class="text-xl font-bold tracking-tight">Meister Uni</span>
            </div>
            <nav class="hidden md:flex gap-8 text-sm font-medium">
                <a href="dashboard.html" class="hover:text-indigo-600">Dashboard</a>
                <a href="forum.html" class="hover:text-indigo-600">Forum</a>
                <a href="kalender.html" class="hover:text-indigo-600">Kalender</a>
            </nav>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors">
                    <i data-lucide="moon"></i>
                </button>
                <a href="login.html" id="user-nav-link" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-bold hover:bg-indigo-700">Login</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-20 text-center">
        <h1 class="text-6xl font-extrabold mb-6 tracking-tight">Systematisch zum <span class="text-indigo-600">Meister-Abschluss.</span></h1>
        <p class="text-xl text-gray-500 mb-12 max-w-2xl mx-auto">Die All-in-One Plattform für deinen Studienerfolg. Pläne, Forum, Kalender.</p>
        
        <div class="max-w-2xl mx-auto bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl border border-gray-100 dark:border-slate-700 text-left">
            <h2 class="text-2xl font-bold mb-6">Plan-Generator</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="uni" placeholder="Uni" class="p-4 rounded-2xl bg-gray-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="text" id="subject" placeholder="Studienfach" class="p-4 rounded-2xl bg-gray-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="task-type" class="p-4 rounded-2xl bg-gray-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="exam">Prüfung</option>
                    <option value="paper">Hausarbeit</option>
                </select>
                <input type="date" id="exam-date" class="p-4 rounded-2xl bg-gray-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" id="hours" placeholder="Stunden/Woche" class="p-4 rounded-2xl bg-gray-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="level" class="p-4 rounded-2xl bg-gray-50 dark:bg-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="1">Kein Vorwissen</option>
                    <option value="2">Basis-Wissen</option>
                </select>
            </div>
            <button onclick="Generator.create()" class="w-full mt-6 bg-indigo-600 text-white font-bold py-5 rounded-2xl hover:bg-indigo-700 transition-all">Lernplan generieren</button>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
