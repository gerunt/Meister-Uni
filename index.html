<!DOCTYPE html>
<html lang="de" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meister Uni | Dein Studium. Dein Plan.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i data-lucide="book-open"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">Meister Uni</span>
            </div>
            
            <nav class="hidden md:flex gap-8 font-medium">
                <a href="#features" class="hover:text-indigo-600 transition-colors">Vorteile</a>
                <a href="#forum" class="hover:text-indigo-600 transition-colors">Campus</a>
                <a href="#login" class="hover:text-indigo-600 transition-colors">Login</a>
            </nav>

            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors">
                    <i data-lucide="moon" class="dark:hidden"></i>
                    <i data-lucide="sun" class="hidden dark:block"></i>
                </button>
                <a href="dashboard.html" class="bg-indigo-600 text-white px-5 py-2 rounded-full font-medium hover:bg-indigo-700 transition-all">Starten</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-20 text-center">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-100 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-sm font-medium mb-8">
            <span class="h-2 w-2 rounded-full bg-indigo-600 animate-pulse"></span>
            Neu: KI-Lernpläne für das Sommersemester 2026
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
            Dein Studium. <br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-500">Dein perfekter Plan.</span>
        </h1>
        <p class="text-lg text-gray-600 dark:text-gray-400 mb-10 max-w-2xl mx-auto">
            Meister Uni analysiert dein Studienfach, deine Deadlines und deine persönliche Zeit – für weniger Stress und bessere Noten.
        </p>
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <button class="bg-indigo-600 text-white px-8 py-4 rounded-full font-bold text-lg shadow-lg hover:scale-105 transition-transform">Lernplan erstellen</button>
            <button class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 px-8 py-4 rounded-full font-bold text-lg hover:bg-gray-50 transition-colors">So funktioniert's</button>
        </div>
    </main>

    <script>
        // Icons initialisieren
        lucide.createIcons();
    </script>
</body>
</html>
