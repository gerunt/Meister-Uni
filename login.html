<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login | Meister Uni</title>
</head>
<body class="bg-gray-50 dark:bg-slate-900 h-screen flex items-center justify-center">
    <div class="bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] shadow-xl w-full max-w-md text-center border border-gray-100 dark:border-slate-700">
        <h1 class="text-3xl font-bold mb-2 text-indigo-600">Willkommen zurück</h1>
        <p class="text-gray-500 mb-8">Logge dich ein, um deine Pläne zu sehen.</p>
        <input type="text" id="username" placeholder="Benutzername" class="w-full p-4 rounded-2xl bg-gray-50 dark:bg-slate-900 mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
        <input type="password" placeholder="Passwort" class="w-full p-4 rounded-2xl bg-gray-50 dark:bg-slate-900 mb-6 outline-none focus:ring-2 focus:ring-indigo-500">
        <button onclick="Auth.login(document.getElementById('username').value)" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all">Einloggen</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
