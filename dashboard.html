<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Dashboard | Meister Uni</title>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Mein Dashboard</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="check-circle"></i> Heutige Aufgaben</h2>
                <ul class="space-y-4">
                    <li class="flex items-center justify-between p-4 bg-gray-50 dark:bg-slate-700/50 rounded-xl">
                        <span>Zusammenfassung Kap. 3 (VWL)</span>
                        <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded">45 Min</span>
                    </li>
                    <li class="flex items-center justify-between p-4 bg-gray-50 dark:bg-slate-700/50 rounded-xl">
                        <span>Übung Statistik: Regression</span>
                        <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded">90 Min</span>
                    </li>
                </ul>
            </div>

            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700">
                <h2 class="text-xl font-bold mb-4">Fortschritt</h2>
                <div class="w-full bg-gray-200 dark:bg-slate-700 rounded-full h-4 mb-2">
                    <div class="bg-indigo-600 h-4 rounded-full" style="width: 65%"></div>
                </div>
                <p class="text-sm text-gray-500 italic">Du hast 65% deiner Wochenziele erreicht!</p>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
