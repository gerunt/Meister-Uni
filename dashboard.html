<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Dashboard | Meister Uni</title>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 transition-colors">
    <header class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 h-16 flex items-center px-4 justify-between">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="bg-indigo-600 p-2 rounded-lg text-white"><i data-lucide="layout-dashboard"></i></div>
            <span class="text-xl font-bold">Meister Uni</span>
        </div>
        <button onclick="Auth.logout()" class="text-sm text-gray-500 hover:text-red-500">Logout</button>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <h1 class="text-3xl font-bold mb-2">Plan für <span id="display-subject" class="text-indigo-600">...</span></h1>
                <div id="task-container" class="mt-8"></div>
            </div>
            <div class="space-y-6">
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-gray-100 dark:border-slate-700">
                    <h2 class="font-bold mb-4">Fortschritt</h2>
                    <div class="w-full bg-gray-100 dark:bg-slate-700 rounded-full h-3 mb-2">
                        <div id="progress-bar" class="bg-indigo-600 h-3 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                    <span id="progress-text" class="text-sm font-bold text-indigo-600">0%</span>
                </div>
                <div class="bg-indigo-600 p-6 rounded-3xl text-white">
                    <h2 class="font-bold mb-2">Campus Forum</h2>
                    <p class="text-sm opacity-80 mb-4">Schau nach, was andere Studierende zu diesem Fach schreiben.</p>
                    <a href="forum.html" class="inline-block bg-white text-indigo-600 px-4 py-2 rounded-xl text-xs font-bold">Zum Forum</a>
                </div>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
